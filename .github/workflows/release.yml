name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  BUN_COMPILE_FLAGS: --compile --minify --bytecode --external effect --external sury --external '@valibot/to-json-schema'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            npm: osa-mcp-darwin-arm64
            os: '["darwin"]'
            cpu: '["arm64"]'
            ext: ""
          - target: bun-darwin-x64
            npm: osa-mcp-darwin-x64
            os: '["darwin"]'
            cpu: '["x64"]'
            ext: ""
          - target: bun-linux-x64
            npm: osa-mcp-linux-x64
            os: '["linux"]'
            cpu: '["x64"]'
            ext: ""
          - target: bun-linux-arm64
            npm: osa-mcp-linux-arm64
            os: '["linux"]'
            cpu: '["arm64"]'
            ext: ""
          - target: bun-linux-x64-musl
            npm: osa-mcp-linux-x64-musl
            os: '["linux"]'
            cpu: '["x64"]'
            ext: ""
          - target: bun-linux-arm64-musl
            npm: osa-mcp-linux-arm64-musl
            os: '["linux"]'
            cpu: '["arm64"]'
            ext: ""
          - target: bun-windows-x64
            npm: osa-mcp-windows-x64
            os: '["win32"]'
            cpu: '["x64"]'
            ext: ".exe"
          - target: bun-windows-arm64
            npm: osa-mcp-windows-arm64
            os: '["win32"]'
            cpu: '["arm64"]'
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile
        run: bun build ${{ env.BUN_COMPILE_FLAGS }} --target=${{ matrix.target }} src/mcp.ts --outfile dist/osa-mcp${{ matrix.ext }}

      - name: Package npm
        run: |
          mkdir -p npm-pkg
          cp dist/osa-mcp${{ matrix.ext }} npm-pkg/
          node -e "
            const pkg = {
              name: process.env.NPM_NAME,
              version: process.env.TAG.replace(/^v/, ''),
              description: 'osa-mcp binary for ' + process.env.TARGET,
              license: 'BSD-3-Clause',
              repository: { type: 'git', url: 'git+https://github.com/MayCXC/osa-mcp.git' },
              bin: { 'osa-mcp': 'osa-mcp' + process.env.EXT },
              os: JSON.parse(process.env.OS_FIELD),
              cpu: JSON.parse(process.env.CPU_FIELD),
              files: ['osa-mcp' + process.env.EXT]
            };
            require('fs').writeFileSync('npm-pkg/package.json', JSON.stringify(pkg, null, 2));
          "
        env:
          TAG: ${{ github.ref_name }}
          NPM_NAME: ${{ matrix.npm }}
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
          OS_FIELD: ${{ matrix.os }}
          CPU_FIELD: ${{ matrix.cpu }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm }}
          path: dist/osa-mcp${{ matrix.ext }}

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm }}
          path: npm-pkg/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # Rename binaries for release (include platform in filename)
      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/osa-mcp-*/; do
            name=$(basename "$dir")
            for f in "$dir"/*; do
              base=$(basename "$f")
              if [ "$base" = "osa-mcp.exe" ]; then
                cp "$f" "release/${name}.exe"
              elif [ "$base" = "osa-mcp" ]; then
                cp "$f" "release/${name}"
              fi
            done
          done

      # GitHub Release
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

      # npm: setup auth (OIDC provenance if trusted publishers configured, token fallback)
      - name: Setup npm auth
        run: |
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc
          fi

      # npm: publish platform packages
      - name: Publish platform packages to npm
        run: |
          for dir in artifacts/npm-osa-mcp-*; do
            echo "Publishing $(basename $dir)..."
            cd "$dir"
            npm publish --access public --provenance
            cd -
          done

      # npm: publish root package
      - name: Publish root package to npm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq ".version = \"$VERSION\"" package.json > package.json.tmp && mv package.json.tmp package.json
          npm publish --access public --provenance
